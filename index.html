<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Intervall Timer">
<title>Intervall Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--surface:#161a22;--surface2:#1e2330;--border:#2a3040;
  --work:#f97316;--work-dim:rgba(249,115,22,0.15);
  --rest:#22c55e;--rest-dim:rgba(34,197,94,0.15);
  --kb:#a78bfa;--kb-dim:rgba(167,139,250,0.15);
  --err:#ef4444;--err-dim:rgba(239,68,68,0.15);
  --text:#f0f2f5;--muted:#6b7280;--radius:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
body{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;min-height:100vh;min-height:100dvh;}
.screen{display:none;-webkit-flex-direction:column;flex-direction:column;-webkit-flex:1;flex:1;padding:24px 20px;gap:20px;overflow:hidden;}
.screen.active{display:-webkit-flex;display:flex;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:22px;letter-spacing:-0.5px;}
.logo span{color:var(--work);}
.header{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;-webkit-flex-shrink:0;flex-shrink:0;}

/* TAB BAR */
.tab-bar{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-shrink:0;flex-shrink:0;}
.tab-btn{-webkit-flex:1;flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.tab-btn.active-timer{border-color:var(--work);background:var(--work-dim);color:var(--work);}
.tab-btn.active-kb{border-color:var(--kb);background:var(--kb-dim);color:var(--kb);}

/* LISTS */
.training-list{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-flex:1;flex:1;}
.training-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:14px;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;}
.training-card:active{border-color:var(--work);}
.training-card.kb-card:active{border-color:var(--kb);}
.training-info{-webkit-flex:1;flex:1;min-width:0;}
.training-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.training-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.training-actions{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-shrink:0;flex-shrink:0;}
.card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.5px;}
.badge-work{background:var(--work-dim);color:var(--work);}
.badge-rest{background:var(--rest-dim);color:var(--rest);}
.badge-kb{background:var(--kb-dim);color:var(--kb);}
.btn-icon{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;padding:0;}
.btn-icon:active{border-color:var(--work);color:var(--work);}
.btn-icon.danger:active{border-color:var(--err);color:var(--err);}
.btn-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.empty-state{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:12px;color:var(--muted);text-align:center;}
.empty-text{font-size:15px;line-height:1.5;}

/* SETUP */
.interval-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:1fr 1fr auto;gap:12px;-webkit-align-items:center;align-items:center;-webkit-flex-shrink:0;flex-shrink:0;}
.interval-card.type-work{border-left:3px solid var(--work);}
.interval-card.type-rest{border-left:3px solid var(--rest);}
.interval-card .field{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--muted);font-weight:500;}
.interval-card input[type="text"]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-weight:600;padding:8px 10px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none;}
.interval-card input:focus{border-color:var(--work);}
.interval-card input.error{border-color:var(--err);background:var(--err-dim);}
.btn-remove{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:8px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;}
.btn-remove:active{color:var(--err);}
.btn-remove svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
.type-toggle{display:-webkit-flex;display:flex;gap:6px;grid-column:1 / -1;}
.type-btn{-webkit-flex:1;flex:1;padding:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.type-btn.work.active{background:var(--work-dim);border-color:var(--work);color:var(--work);}
.type-btn.rest.active{background:var(--rest-dim);border-color:var(--rest);color:var(--rest);}
.rounds-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.rounds-row span{font-size:14px;}
.stepper{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:14px;}
.step-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;font-family:inherit;}
.step-btn:active{background:var(--work-dim);border-color:var(--work);}
.step-val{font-size:22px;font-weight:700;min-width:32px;text-align:center;}
.name-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px 16px;-webkit-flex-shrink:0;flex-shrink:0;}
.name-row.error{border-color:var(--err);background:var(--err-dim);}
.name-row input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:600;width:100%;outline:none;font-family:inherit;padding:10px 0;}
.name-row input::-webkit-input-placeholder{color:var(--muted);}
.name-row input::-moz-placeholder{color:var(--muted);}
.name-row input::placeholder{color:var(--muted);}
.btn-add{background:var(--surface2);border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-size:14px;padding:13px;cursor:pointer;font-family:inherit;font-weight:500;-webkit-flex-shrink:0;flex-shrink:0;width:100%;}
.btn-add:active{border-color:var(--work);color:var(--work);}
.btn-primary{background:var(--work);border:none;border-radius:var(--radius);color:#fff;font-size:17px;font-weight:700;padding:17px;cursor:pointer;font-family:inherit;-webkit-flex-shrink:0;flex-shrink:0;}
.btn-primary:active{opacity:0.85;}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-weight:600;padding:14px;cursor:pointer;font-family:inherit;-webkit-flex-shrink:0;flex-shrink:0;}
.btn-secondary:active{background:var(--border);}
.list-area{overflow-y:auto;-webkit-overflow-scrolling:touch;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:10px;-webkit-flex:1;flex:1;}
.bottom-area{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:10px;-webkit-flex-shrink:0;flex-shrink:0;margin-top:4px;}
.btn-row{display:-webkit-flex;display:flex;gap:10px;}
.btn-row .btn-primary{-webkit-flex:2;flex:2;}
.btn-row .btn-secondary{-webkit-flex:1;flex:1;}
.btn-back{background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-weight:600;padding:9px 16px;cursor:pointer;font-family:inherit;}
.btn-back:active{background:var(--surface2);}

/* TIMER */
#timerScreen{-webkit-justify-content:space-between;justify-content:space-between;}
.timer-header{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.round-badge{font-size:13px;color:var(--muted);font-weight:500;}
.round-badge span{color:var(--text);font-weight:700;}
.ring-wrap{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-flex:1;flex:1;gap:8px;}
.ring-svg{width:min(300px,80vw);height:min(300px,80vw);}
.ring-track{fill:none;stroke:var(--surface2);}
.ring-progress{fill:none;stroke:var(--work);stroke-linecap:round;-webkit-transform:rotate(-90deg);transform:rotate(-90deg);-webkit-transform-origin:50% 50%;transform-origin:50% 50%;-webkit-transition:stroke-dashoffset 0.9s linear,stroke 0.3s;transition:stroke-dashoffset 0.9s linear,stroke 0.3s;}
.ring-center{position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;}
.ring-container{position:relative;display:-webkit-flex;display:flex;}
.timer-time{font-family:'Space Grotesk',sans-serif;font-size:clamp(52px,18vw,80px);font-weight:700;letter-spacing:-2px;line-height:1;}
.timer-phase{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-top:6px;}
.timer-phase.work{color:var(--work);}
.timer-phase.rest{color:var(--rest);}
.next-up{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;min-height:52px;-webkit-flex-shrink:0;flex-shrink:0;}
.next-up .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.next-up .value{font-size:14px;font-weight:600;margin-top:3px;}
.timer-controls{display:-webkit-flex;display:flex;gap:12px;-webkit-flex-shrink:0;flex-shrink:0;}
.btn-control{-webkit-flex:1;flex:1;border-radius:var(--radius);border:none;font-size:16px;font-weight:700;padding:17px;cursor:pointer;font-family:inherit;}
.btn-control:active{opacity:0.8;}
.btn-pause{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-skip{background:var(--border);color:var(--muted);}

/* DONE */
#doneScreen{-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:20px;text-align:center;}
.done-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;}
.done-sub{color:var(--muted);font-size:15px;}
.btn-again{background:var(--work);border:none;border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;padding:15px 40px;cursor:pointer;font-family:inherit;}

/* DOTS */
.phase-dots{display:-webkit-flex;display:flex;gap:6px;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-justify-content:center;justify-content:center;padding:0 4px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);-webkit-transition:all 0.3s;transition:all 0.3s;}
.dot.done-work{background:var(--work);border-color:var(--work);}
.dot.done-rest{background:var(--rest);border-color:var(--rest);}
.dot.current{-webkit-transform:scale(1.35);transform:scale(1.35);box-shadow:0 0 0 2px var(--bg),0 0 0 3px currentColor;}
.dot.current.work{color:var(--work);background:var(--work);border-color:var(--work);}
.dot.current.rest{color:var(--rest);background:var(--rest);border-color:var(--rest);}

/* NEW BTN */
.btn-new{background:none;border:1px solid var(--work);border-radius:10px;color:var(--work);font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:inherit;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;}
.btn-new:active{background:var(--work-dim);}
.btn-new svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
.btn-new.kb{border-color:var(--kb);color:var(--kb);}
.btn-new.kb:active{background:var(--kb-dim);}

/* KETTLEBELL SETUP */
.kb-option-row{display:-webkit-flex;display:flex;gap:8px;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-opt{-webkit-flex:1;flex:1;padding:12px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;}
.kb-opt.active{border-color:var(--kb);background:var(--kb-dim);color:var(--kb);}
.kb-dur-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-dur-row span{font-size:14px;}
.preview-list{overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;}
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;-webkit-flex-shrink:0;flex-shrink:0;}
.preview-card-info{-webkit-flex:1;flex:1;min-width:0;}
.preview-card-name{font-size:14px;font-weight:600;}
.preview-card-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.preview-card-dur{font-size:13px;font-weight:700;color:var(--kb);-webkit-flex-shrink:0;flex-shrink:0;}

/* KB EXERCISE SCREEN */
#kbExScreen{-webkit-justify-content:space-between;justify-content:space-between;gap:12px;}
.kb-ex-header{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-progress-bar{height:4px;background:var(--surface2);border-radius:2px;-webkit-flex-shrink:0;flex-shrink:0;overflow:hidden;}
.kb-progress-fill{height:100%;background:var(--kb);border-radius:2px;-webkit-transition:width 0.5s;transition:width 0.5s;}
.kb-anim-wrap{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;min-height:0;}
.kb-anim-wrap svg{width:min(220px,60vw);height:min(220px,60vw);}
.kb-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-ex-name{font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.kb-ex-desc{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5;}
.kb-timer-row{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-timer-big{font-family:'Space Grotesk',sans-serif;font-size:clamp(48px,16vw,72px);font-weight:700;letter-spacing:-2px;color:var(--kb);}
.kb-timer-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:right;}
.kb-next-label{font-size:12px;color:var(--muted);}
.kb-next-name{font-size:14px;font-weight:600;margin-top:2px;}
.kb-controls{display:-webkit-flex;display:flex;gap:10px;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-controls .btn-control{font-size:15px;padding:15px;}
.kb-rest-overlay{background:var(--rest-dim);border:1px solid var(--rest);border-radius:var(--radius);padding:16px;text-align:center;-webkit-flex-shrink:0;flex-shrink:0;}
.kb-rest-label{font-size:11px;color:var(--rest);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.kb-rest-time{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:var(--rest);}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="homeScreen" class="screen active">
  <div class="header">
    <div class="logo">Intervall<span>.</span></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active-timer" id="tabTimer" onclick="switchTab('timer')">Timer</button>
    <button class="tab-btn" id="tabKb" onclick="switchTab('kb')">Kettlebell</button>
  </div>

  <!-- Timer tab content -->
  <div id="timerTab" style="display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-flex:1;flex:1;gap:16px;overflow:hidden;">
    <div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;">
      <div class="section-label" style="margin:0;">Meine Trainings</div>
      <button class="btn-new" onclick="newTraining()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Neu
      </button>
    </div>
    <div class="training-list" id="trainingList"></div>
  </div>

  <!-- Kettlebell tab content -->
  <div id="kbTab" style="display:none;-webkit-flex-direction:column;flex-direction:column;-webkit-flex:1;flex:1;gap:16px;overflow:hidden;">
    <div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;-webkit-flex-shrink:0;flex-shrink:0;">
      <div class="section-label" style="margin:0;">Kettlebell Workouts</div>
      <button class="btn-new kb" onclick="showKbSetup()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Neu
      </button>
    </div>
    <div class="training-list" id="kbList"></div>
  </div>
</div>

<!-- ===== TIMER SETUP ===== -->
<div id="setupScreen" class="screen">
  <div class="header">
    <button class="btn-back" onclick="goHome()">Zurueck</button>
    <div style="font-size:13px;color:var(--muted);font-weight:500;" id="setupTitle">Neues Training</div>
  </div>
  <div class="name-row" id="nameRow">
    <input type="text" id="trainingNameInput" placeholder="Training benennen...">
  </div>
  <div style="-webkit-flex-shrink:0;flex-shrink:0;">
    <div class="section-label">Runden</div>
    <div class="rounds-row">
      <span>Wiederholungen</span>
      <div class="stepper">
        <button class="step-btn" onclick="changeRounds(-1)">-</button>
        <div class="step-val" id="roundsVal">3</div>
        <button class="step-btn" onclick="changeRounds(1)">+</button>
      </div>
    </div>
  </div>
  <div style="-webkit-flex-shrink:0;flex-shrink:0;"><div class="section-label">Intervalle (pro Runde)</div></div>
  <div class="list-area" id="intervalList"></div>
  <div class="bottom-area">
    <button class="btn-add" onclick="addInterval()">+ Intervall hinzufuegen</button>
    <div class="btn-row">
      <button class="btn-secondary" onclick="saveTraining()">Speichern</button>
      <button class="btn-primary" onclick="saveAndStart()">Starten</button>
    </div>
  </div>
</div>

<!-- ===== KETTLEBELL SETUP ===== -->
<div id="kbSetupScreen" class="screen">
  <div class="header">
    <button class="btn-back" onclick="goHome()">Zurueck</button>
    <div style="font-size:13px;color:var(--muted);font-weight:500;">Kettlebell Workout</div>
  </div>
  <div class="name-row" id="kbNameRow">
    <input type="text" id="kbNameInput" placeholder="Workout benennen...">
  </div>
  <div style="-webkit-flex-shrink:0;flex-shrink:0;">
    <div class="section-label">Schwierigkeitsgrad</div>
    <div class="kb-option-row" id="kbLevelRow">
      <button class="kb-opt active" onclick="setKbLevel('beginner')">Anfaenger</button>
      <button class="kb-opt" onclick="setKbLevel('intermediate')">Mittel</button>
      <button class="kb-opt" onclick="setKbLevel('advanced')">Fortgeschritten</button>
    </div>
  </div>
  <div style="-webkit-flex-shrink:0;flex-shrink:0;">
    <div class="section-label">Dauer</div>
    <div class="kb-dur-row">
      <span id="kbDurLabel">20 Minuten</span>
      <div class="stepper">
        <button class="step-btn" onclick="changeKbDur(-5)">-</button>

/* ===================== WAKE LOCK ===================== */
var wakeLock=null;
function requestWakeLock(){
  if('wakeLock' in navigator){ navigator.wakeLock.request('screen').then(function(wl){wakeLock=wl;}).catch(function(){}); }
}
function releaseWakeLock(){ if(wakeLock){try{wakeLock.release();}catch(e){} wakeLock=null;} }

  if(document.visibilityState==='visible'&&(timer||kbTimer)&&!paused) requestWakeLock();
});

/* ===================== AUDIO ===================== */
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(audioCtx.state==='suspended'){try{audioCtx.resume();}catch(e){}}
  return audioCtx;
}
function beep(freq,dur,vol){
  var ctx=getAudioCtx();if(!ctx)return;
  try{
    var osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
document.addEventListener('touchstart',function(){getAudioCtx();},{once:true,passive:true});
document.addEventListener('click',function(){getAudioCtx();},{once:true});
var beeped=[];
function maybeBeep(rem){
  if(rem>=1&&rem<=5&&beeped.indexOf(rem)===-1){
    beeped.push(rem);
    beep(rem===1?1200:880,rem===1?0.18:0.10,rem===1?0.7:0.5);
  }
}

/* ===================== TIMER TRAINING CRUD ===================== */
var editingId=null,intervals=[],rounds=3;

function newTraining(){
  editingId=null;
  intervals=[{name:'Arbeit',duration:40,type:'work'},{name:'Pause',duration:20,type:'rest'}];
  rounds=3;
  document.getElementById('trainingNameInput').value='';
  document.getElementById('roundsVal').textContent='3';
  document.getElementById('setupTitle').textContent='Neues Training';
  clearErrors(); renderList(); showScreen('setupScreen');
}

function editTraining(id){
  var t=findById(id,trainings);if(!t)return;
  editingId=id; intervals=JSON.parse(JSON.stringify(t.intervals)); rounds=t.rounds;
  document.getElementById('trainingNameInput').value=t.name;
  document.getElementById('roundsVal').textContent=rounds;
  document.getElementById('setupTitle').textContent='Training bearbeiten';
  clearErrors(); renderList(); showScreen('setupScreen');
}

function deleteTraining(id){
  if(!confirm('Training wirklich loeschen?'))return;
  for(var i=0;i<trainings.length;i++){if(trainings[i].id===id){trainings.splice(i,1);break;}}
  persist(); renderHome();
}

function startById(id){
  var t=findById(id,trainings);if(!t)return;
  intervals=JSON.parse(JSON.stringify(t.intervals)); rounds=t.rounds; launchTimer();
}

function addInterval(name,dur,type){
  collectFormData();
  intervals.push({name:name||'Arbeit',duration:dur||30,type:type||'work'});
  renderList();
}

function removeInterval(i){ collectFormData(); intervals.splice(i,1); renderList(); }

function changeRounds(d){ rounds=Math.max(1,Math.min(99,rounds+d)); document.getElementById('roundsVal').textContent=rounds; }

function renderList(){
  var el=document.getElementById('intervalList'); el.innerHTML='';
  for(var i=0;i<intervals.length;i++){
    (function(iv,idx){
      var card=document.createElement('div');
      card.className='interval-card type-'+iv.type;
      card.innerHTML='<div class="type-toggle"><button class="type-btn work'+(iv.type==='work'?' active':'')+'" onclick="setType('+idx+',\'work\')">Arbeit</button><button class="type-btn rest'+(iv.type==='rest'?' active':'')+'" onclick="setType('+idx+',\'rest\')">Pause</button></div><div class="field"><label>Name</label><input type="text" id="n'+idx+'" value="'+escHtml(iv.name)+'"></div><div class="field"><label>Sekunden</label><input type="text" inputmode="numeric" pattern="[0-9]*" id="d'+idx+'" value="'+iv.duration+'"></div><button class="btn-remove" onclick="removeInterval('+idx+')">'+ICON_CLOSE+'</button>';
      el.appendChild(card);
    })(intervals[i],i);
  }
}

function setType(i,type){ collectFormData(); intervals[i].type=type; renderList(); }

function collectFormData(){
  for(var i=0;i<intervals.length;i++){
    var n=document.getElementById('n'+i),d=document.getElementById('d'+i);
    if(n) intervals[i].name=n.value;
    if(d) intervals[i].duration=parseInt(d.value)||intervals[i].duration;
  }
}

function clearErrors(){ var nr=document.getElementById('nameRow'); if(nr) nr.classList.remove('error'); }

function validate(){
  collectFormData();
  var ok=true,nr=document.getElementById('nameRow'),nameVal=document.getElementById('trainingNameInput').value.trim();
  if(!nameVal){nr.classList.add('error');ok=false;}else{nr.classList.remove('error');}
  if(intervals.length===0){alert('Fuege mindestens ein Intervall hinzu.');return false;}
  for(var i=0;i<intervals.length;i++){
    var nEl=document.getElementById('n'+i),dEl=document.getElementById('d'+i);
    if(nEl){if(!intervals[i].name.trim()){nEl.classList.add('error');ok=false;}else{nEl.classList.remove('error');}}
    if(dEl){var dur=parseInt(dEl.value);if(!dur||dur<1){dEl.classList.add('error');ok=false;}else{dEl.classList.remove('error');}}
  }
  return ok;
}

function upsertTraining(name){
  if(editingId){
    for(var i=0;i<trainings.length;i++){if(trainings[i].id===editingId){trainings[i]={id:editingId,name:name,rounds:rounds,intervals:JSON.parse(JSON.stringify(intervals))};break;}}
  }else{
    var id='T'+Date.now();
    trainings.push({id:id,name:name,rounds:rounds,intervals:JSON.parse(JSON.stringify(intervals))});
    editingId=id;
  }
  persist();
}

function saveTraining(){ if(!validate())return; upsertTraining(document.getElementById('trainingNameInput').value.trim()); renderHome(); showScreen('homeScreen'); }
function saveAndStart(){ if(!validate())return; upsertTraining(document.getElementById('trainingNameInput').value.trim()); launchTimer(); }

/* ===================== KB WORKOUT CRUD ===================== */
var kbLevel='beginner', kbDurMin=20, kbEditId=null, kbGenerated=[];

function showKbSetup(){
  kbEditId=null; kbLevel='beginner'; kbDurMin=20;
  document.getElementById('kbNameInput').value='';
  document.getElementById('kbDurVal').textContent='20';
  document.getElementById('kbDurLabel').textContent='20 Minuten';
  document.getElementById('kbNameRow').classList.remove('error');
  var btns=document.getElementById('kbLevelRow').querySelectorAll('.kb-opt');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btns[0].classList.add('active');
  generateKbWorkout();
  showScreen('kbSetupScreen');
}

function setKbLevel(lvl){
  kbLevel=lvl;
  var btns=document.getElementById('kbLevelRow').querySelectorAll('.kb-opt');
  var map={beginner:0,intermediate:1,advanced:2};
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btns[map[lvl]].classList.add('active');
  generateKbWorkout();
}

function changeKbDur(d){
  kbDurMin=Math.max(20,Math.min(30,kbDurMin+d));
  document.getElementById('kbDurVal').textContent=kbDurMin;
  document.getElementById('kbDurLabel').textContent=kbDurMin+' Minuten';
  generateKbWorkout();
}

function generateKbWorkout(){
  var pool=KB_DB[kbLevel].slice();
  var totalSec=kbDurMin*60;
  var result=[];
  var used=[];
  while(true){
    var available=pool.filter(function(ex){ return used.indexOf(ex.id)===-1; });
    if(available.length===0){ used=[]; available=pool.slice(); }
    var idx=Math.floor(Math.random()*available.length);
    var ex=available[idx];
    used.push(ex.id);
    result.push({id:ex.id,name:ex.name,desc:ex.desc,workSec:ex.workSec,restSec:ex.restSec});
    var spent=result.reduce(function(s,e){return s+e.workSec+e.restSec;},0);
    if(spent>=totalSec) break;
    if(result.length>40) break;
  }
  kbGenerated=result;
  renderKbPreview();
}

function renderKbPreview(){
  var el=document.getElementById('kbPreviewList'); el.innerHTML='';
  for(var i=0;i<kbGenerated.length;i++){
    var ex=kbGenerated[i];
    var card=document.createElement('div');
    card.className='preview-card';
    card.innerHTML='<div class="preview-card-info"><div class="preview-card-name">'+escHtml(ex.name)+'</div><div class="preview-card-meta">'+ex.workSec+'s Arbeit + '+ex.restSec+'s Pause</div></div><div class="preview-card-dur">'+fmt(ex.workSec+ex.restSec)+'</div>';
    el.appendChild(card);
  }
}

function saveKbWorkout(){
  var name=document.getElementById('kbNameInput').value.trim();
  if(!name){ document.getElementById('kbNameRow').classList.add('error'); return; }
  document.getElementById('kbNameRow').classList.remove('error');
  if(kbGenerated.length===0){ generateKbWorkout(); }
  var total=kbGenerated.reduce(function(s,e){return s+e.workSec+e.restSec;},0);
  var w={id:'KB'+Date.now(),name:name,level:kbLevel,durationMin:kbDurMin,totalSec:total,exercises:JSON.parse(JSON.stringify(kbGenerated))};
  if(kbEditId){
    for(var i=0;i<kbWorkouts.length;i++){if(kbWorkouts[i].id===kbEditId){kbWorkouts[i]=w;w.id=kbEditId;break;}}
  }else{
    kbWorkouts.push(w);
  }
  persistKb(); renderKbList(); showScreen('homeScreen'); switchTab('kb');
}

function saveAndStartKb(){
  var name=document.getElementById('kbNameInput').value.trim()||'Kettlebell Workout';
  if(kbGenerated.length===0) generateKbWorkout();
  var total=kbGenerated.reduce(function(s,e){return s+e.workSec+e.restSec;},0);
  var w={id:'KB'+Date.now(),name:name,level:kbLevel,durationMin:kbDurMin,totalSec:total,exercises:JSON.parse(JSON.stringify(kbGenerated))};
  kbWorkouts.push(w); persistKb();
  launchKbWorkout(w.exercises);
}

function renderKbList(){
  var el=document.getElementById('kbList');
  if(kbWorkouts.length===0){
    el.innerHTML='<div class="empty-state"><div class="empty-text">Noch keine Kettlebell Workouts.<br>Tippe auf + Neu.</div></div>';
    return;
  }
  el.innerHTML='';
  var lvlLabel={beginner:'Anfaenger',intermediate:'Mittel',advanced:'Fortgeschritten'};
  for(var i=0;i<kbWorkouts.length;i++){
    (function(w){
      var card=document.createElement('div');
      card.className='training-card kb-card';
      card.innerHTML='<div class="training-info"><div class="training-name">'+escHtml(w.name)+'</div><div class="training-meta">'+lvlLabel[w.level]+' | '+w.exercises.length+' Uebungen | ca. '+w.durationMin+' Min</div></div><div class="training-actions"><button class="btn-icon danger" onclick="event.stopPropagation();deleteKbWorkout(\''+w.id+'\')">'+ICON_DEL+'</button></div>';
      card.addEventListener('click',function(){launchKbWorkout(w.exercises);});
      el.appendChild(card);
    })(kbWorkouts[i]);
  }
}

function deleteKbWorkout(id){
  if(!confirm('Workout loeschen?'))return;
  for(var i=0;i<kbWorkouts.length;i++){if(kbWorkouts[i].id===id){kbWorkouts.splice(i,1);break;}}
  persistKb(); renderKbList();
}

/* ===================== KB WORKOUT RUNNER ===================== */
var kbTimer=null, kbPhases=[], kbPhaseIdx=0, kbRemaining=0, kbPaused=false;

function launchKbWorkout(exercises){
  kbPhases=[];
  for(var i=0;i<exercises.length;i++){
    kbPhases.push({type:'work',ex:exercises[i],duration:exercises[i].workSec});
    if(i<exercises.length-1) kbPhases.push({type:'rest',ex:exercises[i],nextEx:exercises[i+1],duration:exercises[i].restSec});
  }
  kbPhaseIdx=0; kbPaused=false;
  document.getElementById('kbExTotal').textContent=exercises.length;
  showScreen('kbExScreen');
  requestWakeLock();
  beginKbPhase();
}

function beginKbPhase(){
  if(kbPhaseIdx>=kbPhases.length){showKbDone();return;}
  var p=kbPhases[kbPhaseIdx];
  kbRemaining=p.duration; beeped=[];
  kbPaused=false;
  document.getElementById('kbPauseBtn').textContent='Pause';

  var exIdx=0,count=0;
  for(var i=0;i<=kbPhaseIdx;i++){if(kbPhases[i].type==='work') count++;}
  document.getElementById('kbExIdx').textContent=count;

  var pct=Math.round((kbPhaseIdx/kbPhases.length)*100);
  document.getElementById('kbProgressFill').style.width=pct+'%';

  if(p.type==='work'){
    document.getElementById('kbExName').textContent=p.ex.name;
    document.getElementById('kbExDesc').textContent=p.ex.desc;
    document.getElementById('kbAnimWrap').innerHTML=getKbAnim(p.ex.id);
    document.getElementById('kbTimerLabel').textContent='ARBEIT';
    document.getElementById('kbTimerBig').style.color='var(--kb)';
    var nextP=kbPhases[kbPhaseIdx+1];
    document.getElementById('kbNextName').textContent=nextP?(nextP.type==='rest'?'Pause':''+nextP.ex.name):'-';
  } else {
    document.getElementById('kbTimerLabel').textContent='PAUSE';
    document.getElementById('kbTimerBig').style.color='var(--rest)';
    document.getElementById('kbNextName').textContent=p.nextEx?p.nextEx.name:'-';
  }
  document.getElementById('kbTimerBig').textContent=fmt(kbRemaining);

  clearInterval(kbTimer);
  kbTimer=setInterval(tickKb,1000);
}

function tickKb(){
  if(kbPaused)return;
  kbRemaining--;
  document.getElementById('kbTimerBig').textContent=fmt(kbRemaining);
  maybeBeep(kbRemaining);
  if(kbRemaining<=0){
    clearInterval(kbTimer);
    if(navigator.vibrate){try{navigator.vibrate([80,40,80]);}catch(e){}}
    beep(kbPhases[kbPhaseIdx].type==='work'?440:600,0.3,0.7);
    kbPhaseIdx++;
    setTimeout(beginKbPhase,400);
  }
}

function toggleKbPause(){
  kbPaused=!kbPaused;
  document.getElementById('kbPauseBtn').textContent=kbPaused?'Weiter':'Pause';
}

function skipKbPhase(){ clearInterval(kbTimer); kbPhaseIdx++; beginKbPhase(); }

function stopKbWorkout(){ clearInterval(kbTimer); releaseWakeLock(); kbPaused=false; renderKbList(); switchTab('kb'); showScreen('homeScreen'); }

function showKbDone(){
  clearInterval(kbTimer); releaseWakeLock();
  document.getElementById('doneSub').textContent='Kettlebell Workout abgeschlossen!';
  document.getElementById('doneAgainBtn').style.display='none';
  showScreen('doneScreen');
  setTimeout(function(){ document.getElementById('doneAgainBtn').style.display=''; goHome(); },4000);
}

/* ===================== INTERVAL TIMER ===================== */
var timer=null,phases=[],phaseIdx=0,remaining=0,paused=false;
var CIRC=2*Math.PI*84;

function launchTimer(){
  phases=[];
  for(var r=0;r<rounds;r++){
    for(var j=0;j<intervals.length;j++){
      phases.push({name:intervals[j].name,duration:intervals[j].duration,type:intervals[j].type,round:r+1});
    }
  }
  phaseIdx=0;paused=false;
  document.getElementById('totalRounds').textContent=rounds;
  buildDots(); showScreen('timerScreen'); requestWakeLock(); beginPhase();
}

function buildDots(){
  var el=document.getElementById('phaseDots');el.innerHTML='';
  for(var i=0;i<phases.length;i++){
    var d=document.createElement('div');d.className='dot '+phases[i].type;d.id='dot-'+i;el.appendChild(d);
  }
}

function updateDots(){
  for(var i=0;i<phases.length;i++){
    var d=document.getElementById('dot-'+i);if(!d)continue;
    d.className='dot';
    if(i<phaseIdx)d.className+=' done-'+phases[i].type;
    else if(i===phaseIdx)d.className+=' current '+phases[i].type;
  }
}

function beginPhase(){
  if(phaseIdx>=phases.length){showDone();return;}
  var p=phases[phaseIdx];
  remaining=p.duration;beeped=[];
  document.getElementById('currentRound').textContent=p.round;
  document.getElementById('pauseBtn').textContent='Pause';
  paused=false;updateDots();
  document.getElementById('ringProg').style.stroke=p.type==='work'?'var(--work)':'var(--rest)';
  document.getElementById('timerTime').textContent=fmt(remaining);
  document.getElementById('timerPhase').textContent=p.name;
  document.getElementById('timerPhase').className='timer-phase '+p.type;
  document.getElementById('ringProg').style.strokeDashoffset='0';
  clearInterval(timer);
  timer=setInterval(tick,1000);
}

function tick(){
  if(paused)return;
  var p=phases[phaseIdx];
  remaining--;
  document.getElementById('timerTime').textContent=fmt(remaining);
  document.getElementById('timerPhase').textContent=p.name;
  document.getElementById('timerPhase').className='timer-phase '+p.type;
  document.getElementById('ringProg').style.strokeDashoffset=CIRC*(1-remaining/p.duration);
  var next=phases[phaseIdx+1];
  document.getElementById('nextUpVal').textContent=next?next.name+' - '+fmt(next.duration):'Letztes Intervall';
  maybeBeep(remaining);
  if(remaining<=0){
    clearInterval(timer);
    if(navigator.vibrate){try{navigator.vibrate([100,50,100]);}catch(e){}}
    beep(520,0.35,0.8);
    phaseIdx++;
    if(phaseIdx>=phases.length){setTimeout(showDone,400);}
    else{setTimeout(beginPhase,400);}
  }
}

function togglePause(){ paused=!paused; document.getElementById('pauseBtn').textContent=paused?'Weiter':'Pause'; }
function skipPhase(){ clearInterval(timer); phaseIdx++; beginPhase(); }

function showDone(){
  clearInterval(timer);releaseWakeLock();
  var total=0;for(var i=0;i<phases.length;i++)total+=phases[i].duration;
  document.getElementById('doneSub').textContent=rounds+(rounds>1?' Runden':' Runde')+' - '+fmt(total)+' Gesamtzeit';
  document.getElementById('doneAgainBtn').style.display='';
  showScreen('doneScreen');
}

function goBack(){ clearInterval(timer);releaseWakeLock();paused=false;renderHome();showScreen('homeScreen'); }

/* ===================== UTILS ===================== */
function showScreen(id){
  var all=document.querySelectorAll('.screen');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}
function fmt(s){ var m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function findById(id,arr){ for(var i=0;i<arr.length;i++){if(arr[i].id===id)return arr[i];}return null; }

renderHome();
</script>
