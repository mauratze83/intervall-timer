<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Intervall Timer">
<title>Intervall Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a3040;
  --work: #f97316; --work-dim: rgba(249,115,22,0.15);
  --rest: #22c55e; --rest-dim: rgba(34,197,94,0.15);
  --text: #f0f2f5; --muted: #6b7280; --radius: 16px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
body { display: flex; flex-direction: column; min-height: 100dvh; }
.screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; gap: 20px; overflow: hidden; }
.screen.active { display: flex; }
.logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; letter-spacing: -0.5px; }
.logo span { color: var(--work); }
.header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; flex-shrink: 0; }
.training-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
.training-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.2s; flex-shrink: 0; }
.training-card:active { border-color: var(--work); }
.training-info { flex: 1; min-width: 0; }
.training-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.training-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.training-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-icon { width: 44px; height: 34px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn-icon:active { border-color: var(--work); color: var(--work); }
.btn-icon.danger:active { border-color: #ef4444; color: #ef4444; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; }
.empty-text { font-size: 15px; }
.interval-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: center; flex-shrink: 0; }
.interval-card.type-work { border-left: 3px solid var(--work); }
.interval-card.type-rest { border-left: 3px solid var(--rest); }
.interval-card .field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--muted); font-weight: 500; }
.interval-card input[type="text"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-weight: 600; padding: 8px 10px; width: 100%; outline: none; font-family: inherit; -webkit-appearance: none; appearance: none; }
.interval-card input:focus { border-color: var(--work); }
.btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; font-weight: 700; padding: 4px 8px; border-radius: 8px; }
.btn-remove:active { color: #ef4444; }
.type-toggle { display: flex; gap: 6px; grid-column: 1 / -1; }
.type-btn { flex: 1; padding: 6px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.type-btn.work.active { background: var(--work-dim); border-color: var(--work); color: var(--work); }
.type-btn.rest.active { background: var(--rest-dim); border-color: var(--rest); color: var(--rest); }
.rounds-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.rounds-row span { font-size: 14px; }
.stepper { display: flex; align-items: center; gap: 14px; }
.step-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-family: inherit; }
.step-btn:active { background: var(--work-dim); border-color: var(--work); }
.step-val { font-size: 22px; font-weight: 700; min-width: 32px; text-align: center; }
.name-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 16px; flex-shrink: 0; }
.name-row input { background: transparent; border: none; color: var(--text); font-size: 16px; font-weight: 600; width: 100%; outline: none; font-family: inherit; padding: 10px 0; }
.name-row input::placeholder { color: var(--muted); }
.btn-add { background: var(--surface2); border: 1px dashed var(--border); border-radius: var(--radius); color: var(--muted); font-size: 14px; padding: 13px; cursor: pointer; font-family: inherit; font-weight: 500; flex-shrink: 0; }
.btn-add:active { border-color: var(--work); color: var(--work); }
.btn-primary { background: var(--work); border: none; border-radius: var(--radius); color: #fff; font-size: 17px; font-weight: 700; padding: 17px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.btn-primary:active { opacity: 0.85; }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.btn-secondary:active { background: var(--border); }
.list-area { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.bottom-area { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; margin-top: 4px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn-primary { flex: 2; }
.btn-row .btn-secondary { flex: 1; }
.btn-back { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 13px; font-weight: 600; padding: 9px 16px; cursor: pointer; font-family: inherit; }
.btn-back:active { background: var(--surface2); }
#timerScreen { justify-content: space-between; }
.timer-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.round-badge { font-size: 13px; color: var(--muted); font-weight: 500; }
.round-badge span { color: var(--text); font-weight: 700; }
.ring-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; }
.ring-svg { width: min(300px, 80vw); height: min(300px, 80vw); }
.ring-track { fill: none; stroke: var(--surface2); }
.ring-progress { fill: none; stroke: var(--work); stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.9s linear, stroke 0.3s; }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-container { position: relative; display: flex; }
.timer-time { font-family: 'Space Grotesk', sans-serif; font-size: clamp(52px, 18vw, 80px); font-weight: 700; letter-spacing: -2px; line-height: 1; }
.timer-phase { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
.timer-phase.work { color: var(--work); }
.timer-phase.rest { color: var(--rest); }
.next-up { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; min-height: 52px; flex-shrink: 0; }
.next-up .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.next-up .value { font-size: 14px; font-weight: 600; margin-top: 3px; }
.timer-controls { display: flex; gap: 12px; flex-shrink: 0; }
.btn-control { flex: 1; border-radius: var(--radius); border: none; font-size: 16px; font-weight: 700; padding: 17px; cursor: pointer; font-family: inherit; }
.btn-control:active { opacity: 0.8; }
.btn-pause { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-skip { background: var(--border); color: var(--muted); }
#doneScreen { align-items: center; justify-content: center; gap: 24px; text-align: center; }
.done-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; }
.done-sub { color: var(--muted); font-size: 15px; }
.btn-again { background: var(--work); border: none; border-radius: var(--radius); color: #fff; font-size: 16px; font-weight: 700; padding: 15px 40px; cursor: pointer; font-family: inherit; }
.phase-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 0 4px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); transition: all 0.3s; }
.dot.done-work { background: var(--work); border-color: var(--work); }
.dot.done-rest { background: var(--rest); border-color: var(--rest); }
.dot.current { transform: scale(1.35); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px currentColor; }
.dot.current.work { color: var(--work); background: var(--work); border-color: var(--work); }
.dot.current.rest { color: var(--rest); background: var(--rest); border-color: var(--rest); }
</style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="header">
    <div class="logo">Intervall<span>.</span></div>
    <button class="btn-icon" onclick="newTraining()" style="width:auto;padding:0 14px;color:var(--work);border-color:var(--work);">+ Neu</button>
  </div>
  <div class="section-label">Meine Trainings</div>
  <div class="training-list" id="trainingList"></div>
</div>

<div id="setupScreen" class="screen">
  <div class="header">
    <button class="btn-back" onclick="goHome()">Zurueck</button>
    <div style="font-size:13px;color:var(--muted);font-weight:500;" id="setupTitle">Neues Training</div>
  </div>
  <div class="name-row">
    <input type="text" id="trainingNameInput" placeholder="Training benennen...">
  </div>
  <div style="flex-shrink:0;">
    <div class="section-label">Runden</div>
    <div class="rounds-row">
      <span>Wiederholungen</span>
      <div class="stepper">
        <button class="step-btn" onclick="changeRounds(-1)">-</button>
        <div class="step-val" id="roundsVal">3</div>
        <button class="step-btn" onclick="changeRounds(1)">+</button>
      </div>
    </div>
  </div>
  <div style="flex-shrink:0;"><div class="section-label">Intervalle (pro Runde)</div></div>
  <div class="list-area" id="intervalList"></div>
  <div class="bottom-area">
    <button class="btn-add" onclick="addInterval()">+ Intervall hinzufuegen</button>
    <div class="btn-row">
      <button class="btn-secondary" onclick="saveTraining()">Speichern</button>
      <button class="btn-primary" onclick="saveAndStart()">Starten</button>
    </div>
  </div>
</div>

<div id="timerScreen" class="screen">
  <div class="timer-header">
    <button class="btn-back" onclick="goBack()">Beenden</button>
    <div class="round-badge">Runde <span id="currentRound">1</span> / <span id="totalRounds">3</span></div>
  </div>
  <div class="ring-wrap">
    <div class="phase-dots" id="phaseDots"></div>
    <div class="ring-container" style="margin-top:12px;">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="84" stroke-width="10"/>
        <circle class="ring-progress" cx="100" cy="100" r="84" stroke-width="10" id="ringProg" stroke-dasharray="527.8" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-time" id="timerTime">00:00</div>
        <div class="timer-phase" id="timerPhase">Bereit</div>
      </div>
    </div>
  </div>
  <div class="next-up">
    <div class="label">Naechstes</div>
    <div class="value" id="nextUpVal">-</div>
  </div>
  <div class="timer-controls">
    <button class="btn-control btn-pause" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="btn-control btn-skip" onclick="skipPhase()">Ueberspringen</button>
  </div>
</div>

<div id="doneScreen" class="screen">
  <div class="done-title">Geschafft!</div>
  <div class="done-sub" id="doneSub">Alle Runden abgeschlossen.</div>
  <button class="btn-again" onclick="goBack()">Nochmal starten</button>
</div>

<script>
var STORAGE_KEY = 'intervall_trainings';
var trainings = [];
var editingId = null;
var intervals = [];
var rounds = 3;
var timer = null;
var phases = [];
var phaseIdx = 0;
var remaining = 0;
var paused = false;
var CIRCUMFERENCE = 2 * Math.PI * 84;

// load from localStorage on start
try { trainings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { trainings = []; }

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trainings)); } catch(e) {}
}

// WAKE LOCK
var wakeLock = null;
function requestWakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').then(function(wl) { wakeLock = wl; }).catch(function(){});
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && timer && !paused) requestWakeLock();
});

// AUDIO
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq, dur, vol) {
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
document.addEventListener('touchstart', function() { getAudioCtx(); }, { once: true });
document.addEventListener('click', function() { getAudioCtx(); }, { once: true });

var countdownBeepedSet = [];
function maybeCountdown(rem) {
  if (rem <= 5 && rem >= 1 && countdownBeepedSet.indexOf(rem) === -1) {
    countdownBeepedSet.push(rem);
    beep(rem === 1 ? 1200 : 880, rem === 1 ? 0.18 : 0.10, rem === 1 ? 0.7 : 0.5);
  }
}

// HOME
function renderHome() {
  var el = document.getElementById('trainingList');
  if (trainings.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-text">Noch keine Trainings gespeichert.<br>Tippe auf + Neu um loszulegen.</div></div>';
    return;
  }
  el.innerHTML = '';
  for (var i = 0; i < trainings.length; i++) {
    (function(t) {
      var totalSec = t.rounds * t.intervals.reduce(function(s, iv) { return s + iv.duration; }, 0);
      var card = document.createElement('div');
      card.className = 'training-card';
      card.innerHTML =
        '<div class="training-info">' +
          '<div class="training-name">' + escHtml(t.name) + '</div>' +
          '<div class="training-meta">' + t.intervals.length + ' Intervalle - ' + t.rounds + ' Runden - ' + formatTime(totalSec) + '</div>' +
        '</div>' +
        '<div class="training-actions">' +
          '<button class="btn-icon" onclick="event.stopPropagation();editTraining(\'' + t.id + '\')">Edit</button>' +
          '<button class="btn-icon danger" onclick="event.stopPropagation();deleteTraining(\'' + t.id + '\')">Del</button>' +
        '</div>';
      card.addEventListener('click', function() { startTrainingById(t.id); });
      el.appendChild(card);
    })(trainings[i]);
  }
}

function goHome() {
  showScreen('homeScreen');
  renderHome();
}

function newTraining() {
  editingId = null;
  intervals = [
    { name: 'Arbeit', duration: 40, type: 'work' },
    { name: 'Pause', duration: 20, type: 'rest' }
  ];
  rounds = 3;
  document.getElementById('trainingNameInput').value = '';
  document.getElementById('roundsVal').textContent = '3';
  document.getElementById('setupTitle').textContent = 'Neues Training';
  renderList();
  showScreen('setupScreen');
}

function editTraining(id) {
  var t = null;
  for (var i = 0; i < trainings.length; i++) { if (trainings[i].id === id) { t = trainings[i]; break; } }
  if (!t) return;
  editingId = id;
  intervals = JSON.parse(JSON.stringify(t.intervals));
  rounds = t.rounds;
  document.getElementById('trainingNameInput').value = t.name;
  document.getElementById('roundsVal').textContent = rounds;
  document.getElementById('setupTitle').textContent = 'Training bearbeiten';
  renderList();
  showScreen('setupScreen');
}

function deleteTraining(id) {
  if (!confirm('Training wirklich loeschen?')) return;
  for (var i = 0; i < trainings.length; i++) {
    if (trainings[i].id === id) { trainings.splice(i, 1); break; }
  }
  persist();
  renderHome();
}

function startTrainingById(id) {
  var t = null;
  for (var i = 0; i < trainings.length; i++) { if (trainings[i].id === id) { t = trainings[i]; break; } }
  if (!t) return;
  intervals = JSON.parse(JSON.stringify(t.intervals));
  rounds = t.rounds;
  launchTimer();
}

// SETUP
function addInterval(name, duration, type) {
  intervals.push({ name: name || 'Arbeit', duration: duration || 30, type: type || 'work' });
  renderList();
}

function removeInterval(i) {
  intervals.splice(i, 1);
  renderList();
}

function changeRounds(d) {
  rounds = Math.max(1, Math.min(99, rounds + d));
  document.getElementById('roundsVal').textContent = rounds;
}

function renderList() {
  var el = document.getElementById('intervalList');
  el.innerHTML = '';
  for (var i = 0; i < intervals.length; i++) {
    (function(iv, idx) {
      var card = document.createElement('div');
      card.className = 'interval-card type-' + iv.type;
      card.innerHTML =
        '<div class="type-toggle">' +
          '<button class="type-btn work ' + (iv.type === 'work' ? 'active' : '') + '" onclick="setType(' + idx + ',\'work\')">Arbeit</button>' +
          '<button class="type-btn rest ' + (iv.type === 'rest' ? 'active' : '') + '" onclick="setType(' + idx + ',\'rest\')">Pause</button>' +
        '</div>' +
        '<div class="field"><label>Name</label><input type="text" id="iv-name-' + idx + '" value="' + escHtml(iv.name) + '"></div>' +
        '<div class="field"><label>Sekunden</label><input type="text" inputmode="numeric" pattern="[0-9]*" id="iv-dur-' + idx + '" value="' + iv.duration + '"></div>' +
        '<button class="btn-remove" onclick="removeInterval(' + idx + ')">X</button>';
      el.appendChild(card);
    })(intervals[i], i);
  }
}

function setType(i, type) {
  collectFormData();
  intervals[i].type = type;
  renderList();
}

function collectFormData() {
  for (var i = 0; i < intervals.length; i++) {
    var nameEl = document.getElementById('iv-name-' + i);
    var durEl = document.getElementById('iv-dur-' + i);
    if (nameEl) intervals[i].name = nameEl.value || intervals[i].name;
    if (durEl) intervals[i].duration = parseInt(durEl.value) || intervals[i].duration;
  }
}

function saveTraining() {
  collectFormData();
  var name = document.getElementById('trainingNameInput').value.trim() || 'Unbenanntes Training';
  if (intervals.length === 0) { alert('Fuege mindestens ein Intervall hinzu.'); return; }
  if (editingId) {
    for (var i = 0; i < trainings.length; i++) {
      if (trainings[i].id === editingId) {
        trainings[i] = { id: editingId, name: name, rounds: rounds, intervals: JSON.parse(JSON.stringify(intervals)) };
        break;
      }
    }
  } else {
    var id = 'T' + Date.now();
    trainings.push({ id: id, name: name, rounds: rounds, intervals: JSON.parse(JSON.stringify(intervals)) });
    editingId = id;
  }
  persist();
  renderHome();
  showScreen('homeScreen');
}

function saveAndStart() {
  collectFormData();
  if (intervals.length === 0) { alert('Fuege mindestens ein Intervall hinzu.'); return; }
  var name = document.getElementById('trainingNameInput').value.trim() || 'Unbenanntes Training';
  if (editingId) {
    for (var i = 0; i < trainings.length; i++) {
      if (trainings[i].id === editingId) {
        trainings[i] = { id: editingId, name: name, rounds: rounds, intervals: JSON.parse(JSON.stringify(intervals)) };
        break;
      }
    }
  } else {
    var id2 = 'T' + Date.now();
    trainings.push({ id: id2, name: name, rounds: rounds, intervals: JSON.parse(JSON.stringify(intervals)) });
  }
  persist();
  launchTimer();
}

// TIMER
function launchTimer() {
  phases = [];
  for (var r = 0; r < rounds; r++) {
    for (var j = 0; j < intervals.length; j++) {
      phases.push({ name: intervals[j].name, duration: intervals[j].duration, type: intervals[j].type, round: r + 1 });
    }
  }
  phaseIdx = 0; paused = false;
  document.getElementById('totalRounds').textContent = rounds;
  buildDots();
  showScreen('timerScreen');
  requestWakeLock();
  beginPhase();
}

function buildDots() {
  var el = document.getElementById('phaseDots');
  el.innerHTML = '';
  for (var i = 0; i < phases.length; i++) {
    var d = document.createElement('div');
    d.className = 'dot ' + phases[i].type;
    d.id = 'dot-' + i;
    el.appendChild(d);
  }
}

function updateDots() {
  for (var i = 0; i < phases.length; i++) {
    var d = document.getElementById('dot-' + i);
    if (!d) continue;
    d.className = 'dot';
    if (i < phaseIdx) d.className += ' done-' + phases[i].type;
    else if (i === phaseIdx) d.className += ' current ' + phases[i].type;
  }
}

function beginPhase() {
  if (phaseIdx >= phases.length) { showDone(); return; }
  var p = phases[phaseIdx];
  remaining = p.duration;
  countdownBeepedSet = [];
  document.getElementById('currentRound').textContent = p.round;
  document.getElementById('pauseBtn').textContent = 'Pause';
  paused = false;
  updateDots();
  document.getElementById('ringProg').style.stroke = p.type === 'work' ? 'var(--work)' : 'var(--rest)';
  document.getElementById('timerTime').textContent = formatTime(remaining);
  document.getElementById('timerPhase').textContent = p.name;
  document.getElementById('timerPhase').className = 'timer-phase ' + p.type;
  document.getElementById('ringProg').style.strokeDashoffset = 0;
  clearInterval(timer);
  timer = setInterval(tick, 1000);
}

function tick() {
  if (paused) return;
  var p = phases[phaseIdx];
  remaining--;
  document.getElementById('timerTime').textContent = formatTime(remaining);
  document.getElementById('timerPhase').textContent = p.name;
  document.getElementById('timerPhase').className = 'timer-phase ' + p.type;
  document.getElementById('ringProg').style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / p.duration);
  var next = phases[phaseIdx + 1];
  document.getElementById('nextUpVal').textContent = next ? next.name + ' - ' + formatTime(next.duration) : 'Letztes Intervall';
  maybeCountdown(remaining);
  if (remaining <= 0) {
    clearInterval(timer);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    beep(520, 0.35, 0.8);
    phaseIdx++;
    var isLast = phaseIdx >= phases.length;
    if (isLast) { setTimeout(showDone, 400); }
    else { setTimeout(beginPhase, 400); }
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Weiter' : 'Pause';
}

function skipPhase() {
  clearInterval(timer);
  phaseIdx++;
  beginPhase();
}

function showDone() {
  clearInterval(timer); releaseWakeLock();
  var total = 0;
  for (var i = 0; i < phases.length; i++) total += phases[i].duration;
  document.getElementById('doneSub').textContent = rounds + (rounds > 1 ? ' Runden' : ' Runde') + ' - ' + formatTime(total) + ' Gesamtzeit';
  showScreen('doneScreen');
}

function goBack() {
  clearInterval(timer); releaseWakeLock(); paused = false;
  renderHome();
  showScreen('homeScreen');
}

function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function formatTime(s) {
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderHome();
</script>
</body>
</html>
