<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Intervall Timer">
<title>Intervall Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2a3040;
    --work: #f97316;
    --work-dim: rgba(249,115,22,0.15);
    --rest: #22c55e;
    --rest-dim: rgba(34,197,94,0.15);
    --text: #f0f2f5;
    --muted: #6b7280;
    --radius: 16px;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; min-height: 100dvh; }

  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; gap: 20px; overflow: hidden; }
  .screen.active { display: flex; }

  .logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--work); }
  .header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; flex-shrink: 0;
  }

  /* -- HOME SCREEN -- */
  .training-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }

  .training-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .training-card:active { border-color: var(--work); }

  .training-icon {
    width: 44px; height: 44px; border-radius: 12px; background: var(--work-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .training-info { flex: 1; min-width: 0; }
  .training-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .training-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .training-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-icon:active { border-color: var(--work); color: var(--work); }
  .btn-icon.danger:active { border-color: #ef4444; color: #ef4444; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: var(--muted); text-align: center;
  }
  .empty-icon { font-size: 48px; }
  .empty-text { font-size: 15px; }

  /* -- SETUP SCREEN -- */
  .interval-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: center;
    transition: border-color 0.2s; flex-shrink: 0;
  }
  .interval-card .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); font-weight: 500; }

  .interval-card input[type="text"] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px; font-weight: 600;
    padding: 8px 10px; width: 100%; outline: none; font-family: inherit;
    -webkit-appearance: none; appearance: none;
    transition: border-color 0.2s;
  }
  .interval-card input:focus { border-color: var(--work); }

  .btn-remove {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 20px; line-height: 1; padding: 4px; border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-remove:active { color: #ef4444; background: rgba(239,68,68,0.12); }

  .interval-card.type-work { border-left: 3px solid var(--work); }
  .interval-card.type-rest { border-left: 3px solid var(--rest); }

  .type-toggle { display: flex; gap: 6px; grid-column: 1 / -1; }
  .type-btn {
    flex: 1; padding: 6px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .type-btn.work.active { background: var(--work-dim); border-color: var(--work); color: var(--work); }
  .type-btn.rest.active { background: var(--rest-dim); border-color: var(--rest); color: var(--rest); }

  .rounds-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .rounds-row span { font-size: 14px; }
  .stepper { display: flex; align-items: center; gap: 14px; }
  .step-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; user-select: none;
  }
  .step-btn:active { background: var(--work-dim); border-color: var(--work); }
  .step-val { font-size: 22px; font-weight: 700; min-width: 32px; text-align: center; }

  /* training name input */
  .name-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px 16px; flex-shrink: 0;
  }
  .name-row input {
    background: transparent; border: none; color: var(--text);
    font-size: 16px; font-weight: 600; width: 100%; outline: none;
    font-family: inherit; padding: 10px 0;
  }
  .name-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: var(--radius); color: var(--muted); font-size: 14px;
    padding: 13px; cursor: pointer; font-family: inherit; font-weight: 500;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-add:active { border-color: var(--work); color: var(--work); }

  .btn-primary {
    background: var(--work); border: none; border-radius: var(--radius);
    color: #fff; font-size: 17px; font-weight: 700; padding: 17px;
    cursor: pointer; font-family: inherit; letter-spacing: 0.3px;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .btn-primary:active { opacity: 0.85; }

  .btn-secondary {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 15px; font-weight: 600;
    padding: 14px; cursor: pointer; font-family: inherit;
    transition: background 0.15s; flex-shrink: 0;
  }
  .btn-secondary:active { background: var(--border); }

  .list-area { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .bottom-area { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; margin-top: 4px; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn-primary { flex: 2; }
  .btn-row .btn-secondary { flex: 1; }

  /* -- TIMER SCREEN -- */
  #timerScreen { justify-content: space-between; }

  .timer-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .btn-back {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 13px; font-weight: 600;
    padding: 9px 16px; cursor: pointer; font-family: inherit;
  }
  .btn-back:active { background: var(--surface2); }

  .round-badge { font-size: 13px; color: var(--muted); font-weight: 500; }
  .round-badge span { color: var(--text); font-weight: 700; }

  .ring-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 8px;
  }
  .ring-svg { width: min(300px, 80vw); height: min(300px, 80vw); }
  .ring-track { fill: none; stroke: var(--surface2); }
  .ring-progress {
    fill: none; stroke: var(--work); stroke-linecap: round;
    transform: rotate(-90deg); transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-container { position: relative; display: flex; }

  .timer-time {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(52px, 18vw, 80px);
    font-weight: 700; letter-spacing: -2px; line-height: 1;
  }
  .timer-phase {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2px; margin-top: 6px;
  }
  .timer-phase.work { color: var(--work); }
  .timer-phase.rest { color: var(--rest); }

  .next-up {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 52px; flex-shrink: 0;
  }
  .next-up .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .next-up .value { font-size: 14px; font-weight: 600; }

  .timer-controls { display: flex; gap: 12px; flex-shrink: 0; }
  .btn-control {
    flex: 1; border-radius: var(--radius); border: none;
    font-size: 16px; font-weight: 700; padding: 17px;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .btn-control:active { opacity: 0.8; }
  .btn-pause { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-skip  { background: var(--border); color: var(--muted); }

  /* -- DONE SCREEN -- */
  #doneScreen { align-items: center; justify-content: center; gap: 24px; text-align: center; }
  .done-icon { font-size: 64px; line-height: 1; }
  .done-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; }
  .done-sub { color: var(--muted); font-size: 15px; }
  .btn-again {
    background: var(--work); border: none; border-radius: var(--radius);
    color: #fff; font-size: 16px; font-weight: 700; padding: 15px 40px;
    cursor: pointer; font-family: inherit;
  }

  /* progress dots */
  .phase-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 0 4px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border); transition: all 0.3s;
  }
  .dot.done-work { background: var(--work); border-color: var(--work); }
  .dot.done-rest { background: var(--rest); border-color: var(--rest); }
  .dot.current { transform: scale(1.35); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px currentColor; }
  .dot.current.work { color: var(--work); background: var(--work); border-color: var(--work); }
  .dot.current.rest { color: var(--rest); background: var(--rest); border-color: var(--rest); }

  /* -- MODAL -- */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    align-items: flex-end; justify-content: center; z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; width: 100%; max-width: 480px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
  .modal input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px; font-weight: 600;
    padding: 12px 14px; width: 100%; outline: none; font-family: inherit;
  }
  .modal input:focus { border-color: var(--work); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .modal-cancel { background: var(--surface2); color: var(--muted); }
  .modal-confirm { background: var(--work); color: #fff; }
</style>
</head>
<body>

<!-- =============== HOME SCREEN =============== -->
<div id="homeScreen" class="screen active">
  <div class="header">
    <div class="logo">Intervall<span>.</span></div>
    <button class="btn-icon" onclick="newTraining()" style="width:auto;padding:0 14px;font-size:13px;font-weight:600;color:var(--work);border-color:var(--work-dim);">+ Neu</button>
  </div>

  <div style="flex-shrink:0;">
    <div class="section-label">Meine Trainings</div>
  </div>

  <div class="training-list" id="trainingList"></div>
</div>

<!-- =============== SETUP SCREEN =============== -->
<div id="setupScreen" class="screen">
  <div class="header" style="flex-shrink:0;">
    <button class="btn-back" onclick="showScreen('homeScreen')">&#x2190; Zur&uuml;ck</button>
    <div style="font-size:13px;color:var(--muted);font-weight:500;" id="setupTitle">Neues Training</div>
  </div>

  <div class="name-row" style="flex-shrink:0;">
    <input type="text" id="trainingNameInput" placeholder="Training benennen...">
  </div>

  <div style="flex-shrink:0;">
    <div class="section-label">Runden</div>
    <div class="rounds-row">
      <span>Wiederholungen</span>
      <div class="stepper">
        <button class="step-btn" onclick="changeRounds(-1)">-</button>
        <div class="step-val" id="roundsVal">3</div>
        <button class="step-btn" onclick="changeRounds(1)">+</button>
      </div>
    </div>
  </div>

  <div style="flex-shrink:0;"><div class="section-label">Intervalle (pro Runde)</div></div>
  <div class="list-area" id="intervalList"></div>

  <div class="bottom-area">
    <button class="btn-add" onclick="addInterval()">+ Intervall hinzuf&uuml;gen</button>
    <div class="btn-row">
      <button class="btn-secondary" onclick="saveTraining()">&#x1F4BE; Speichern</button>
      <button class="btn-primary" onclick="saveAndStart()">&#x25B6; Starten</button>
    </div>
  </div>
</div>

<!-- =============== TIMER SCREEN =============== -->
<div id="timerScreen" class="screen">
  <div class="timer-header">
    <button class="btn-back" onclick="goBack()">&#x2715; Beenden</button>
    <div class="round-badge">Runde <span id="currentRound">1</span> / <span id="totalRounds">3</span></div>
  </div>

  <div class="ring-wrap">
    <div class="phase-dots" id="phaseDots"></div>
    <div class="ring-container" style="margin-top:12px;">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="84" stroke-width="10"/>
        <circle class="ring-progress" cx="100" cy="100" r="84" stroke-width="10"
          id="ringProg" stroke-dasharray="527.8" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-time" id="timerTime">00:00</div>
        <div class="timer-phase" id="timerPhase">Bereit</div>
      </div>
    </div>
  </div>

  <div class="next-up">
    <div>
      <div class="label">N&auml;chstes</div>
      <div class="value" id="nextUpVal">-</div>
    </div>
    <div style="color:var(--muted);font-size:20px;">&#x203A;</div>
  </div>

  <div class="timer-controls">
    <button class="btn-control btn-pause" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="btn-control btn-skip" onclick="skipPhase()">&Uuml;berspringen &#x203A;</button>
  </div>
</div>

<!-- =============== DONE SCREEN =============== -->
<div id="doneScreen" class="screen">
  <div class="done-icon">&#x1F525;</div>
  <div class="done-title">Geschafft!</div>
  <div class="done-sub" id="doneSub">Alle Runden abgeschlossen.</div>
  <button class="btn-again" onclick="goBack()">Nochmal starten</button>
</div>

<!-- =============== RENAME MODAL =============== -->
<div class="modal-backdrop" id="renameModal">
  <div class="modal">
    <div class="modal-title">Training umbenennen</div>
    <input type="text" id="renameInput" placeholder="Name...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-confirm" onclick="confirmRename()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ==============================
// STORAGE
// ==============================
const STORAGE_KEY = 'intervall_trainings';

function loadTrainings() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveTrainings(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ==============================
// STATE
// ==============================
let trainings = loadTrainings();
let editingId = null;      // null = new training
let intervals = [];
let rounds = 3;
let renameId = null;

// timer state
let timer = null;
let phases = [];
let phaseIdx = 0;
let remaining = 0;
let paused = false;
const CIRCUMFERENCE = 2 * Math.PI * 84;

// ==============================
// WAKE LOCK
// ==============================
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && timer && !paused) requestWakeLock();
});

// ==============================
// AUDIO
// ==============================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function beep(frequency = 880, duration = 0.12, volume = 0.6) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(frequency, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch {}
}
document.addEventListener('touchstart', () => { getAudioCtx(); }, { once: true });
document.addEventListener('click',      () => { getAudioCtx(); }, { once: true });

let countdownBeepedSet = new Set();
function maybeCountdown(rem) {
  if (rem <= 5 && rem >= 1 && !countdownBeepedSet.has(rem)) {
    countdownBeepedSet.add(rem);
    beep(rem === 1 ? 1200 : 880, rem === 1 ? 0.18 : 0.10, rem === 1 ? 0.7 : 0.5);
  }
}

// ==============================
// HOME SCREEN
// ==============================
function renderHome() {
  const el = document.getElementById('trainingList');
  trainings = loadTrainings();

  if (trainings.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#x1F3CB;&#xFE0F;</div>
        <div class="empty-text">Noch keine Trainings gespeichert.<br>Tippe auf "+ Neu" um loszulegen.</div>
      </div>`;
    return;
  }

  el.innerHTML = '';
  trainings.forEach(t => {
    const totalSec = t.rounds * t.intervals.reduce((s, iv) => s + iv.duration, 0);
    const card = document.createElement('div');
    card.className = 'training-card';
    card.innerHTML = `
      <div class="training-icon">&#x1F4AA;</div>
      <div class="training-info">
        <div class="training-name">${escHtml(t.name)}</div>
        <div class="training-meta">${t.intervals.length} Intervalle &middot; ${t.rounds} Runden &middot; ${formatTime(totalSec)}</div>
      </div>
      <div class="training-actions">
        <button class="btn-icon" onclick="event.stopPropagation();editTraining('${t.id}')" title="Bearbeiten">&#x270F;&#xFE0F;</button>
        <button class="btn-icon danger" onclick="event.stopPropagation();deleteTraining('${t.id}')" title="L&ouml;schen">&#x1F5D1;&#xFE0F;</button>
      </div>
    `;
    card.addEventListener('click', () => startTrainingById(t.id));
    el.appendChild(card);
  });
}

function newTraining() {
  editingId = null;
  intervals = [
    { name: 'Arbeit', duration: 40, type: 'work' },
    { name: 'Pause',  duration: 20, type: 'rest' }
  ];
  rounds = 3;
  document.getElementById('trainingNameInput').value = '';
  document.getElementById('roundsVal').textContent = rounds;
  document.getElementById('setupTitle').textContent = 'Neues Training';
  renderList();
  showScreen('setupScreen');
}

function editTraining(id) {
  const t = trainings.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  intervals = JSON.parse(JSON.stringify(t.intervals));
  rounds = t.rounds;
  document.getElementById('trainingNameInput').value = t.name;
  document.getElementById('roundsVal').textContent = rounds;
  document.getElementById('setupTitle').textContent = 'Training bearbeiten';
  renderList();
  showScreen('setupScreen');
}

function deleteTraining(id) {
  if (!confirm('Training wirklich l&ouml;schen?')) return;
  trainings = trainings.filter(t => t.id !== id);
  saveTrainings(trainings);
  renderHome();
}

function startTrainingById(id) {
  const t = trainings.find(x => x.id === id);
  if (!t) return;
  intervals = JSON.parse(JSON.stringify(t.intervals));
  rounds = t.rounds;
  launchTimer();
}

// ==============================
// SETUP SCREEN
// ==============================
function addInterval(name = 'Arbeit', duration = 30, type = 'work') {
  intervals.push({ name, duration, type });
  renderList();
}

function removeInterval(i) {
  intervals.splice(i, 1);
  renderList();
}

function changeRounds(d) {
  rounds = Math.max(1, Math.min(99, rounds + d));
  document.getElementById('roundsVal').textContent = rounds;
}

function renderList() {
  const el = document.getElementById('intervalList');
  el.innerHTML = '';
  intervals.forEach((iv, i) => {
    const card = document.createElement('div');
    card.className = `interval-card type-${iv.type}`;
    card.innerHTML = `
      <div class="type-toggle">
        <button class="type-btn work ${iv.type==='work'?'active':''}" onclick="setType(${i},'work')">&#x1F4AA; Arbeit</button>
        <button class="type-btn rest ${iv.type==='rest'?'active':''}" onclick="setType(${i},'rest')">&#x1F62E;&#x200D;&#x1F4A8; Pause</button>
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" value="${escHtml(iv.name)}" onchange="intervals[${i}].name=this.value">
      </div>
      <div class="field">
        <label>Sekunden</label>
        <input type="text" inputmode="numeric" pattern="[0-9]*" value="${iv.duration}"
          onchange="intervals[${i}].duration=parseInt(this.value)||1">
      </div>
      <button class="btn-remove" onclick="removeInterval(${i})">&#xD7;</button>
    `;
    el.appendChild(card);
  });
}

function setType(i, type) {
  intervals[i].type = type;
  renderList();
}

function collectFormData() {
  // sync any unsaved input values
  document.querySelectorAll('#intervalList .interval-card').forEach((card, i) => {
    const inputs = card.querySelectorAll('input');
    intervals[i].name = inputs[0].value || intervals[i].name;
    intervals[i].duration = parseInt(inputs[1].value) || intervals[i].duration;
  });
}

function saveTraining() {
  collectFormData();
  const name = document.getElementById('trainingNameInput').value.trim() || 'Unbenanntes Training';
  if (intervals.length === 0) { alert('F&uuml;ge mindestens ein Intervall hinzu.'); return; }

  if (editingId) {
    const idx = trainings.findIndex(t => t.id === editingId);
    if (idx !== -1) trainings[idx] = { id: editingId, name, rounds, intervals: JSON.parse(JSON.stringify(intervals)) };
  } else {
    const id = 'T' + Date.now();
    trainings.push({ id, name, rounds, intervals: JSON.parse(JSON.stringify(intervals)) });
    editingId = id;
  }
  saveTrainings(trainings);
  document.getElementById('setupTitle').textContent = 'Training bearbeiten';
  // brief visual feedback
  const btn = event.target;
  btn.textContent = '&#x2713; Gespeichert';
  setTimeout(() => btn.textContent = '&#x1F4BE; Speichern', 1200);
}

function saveAndStart() {
  collectFormData();
  if (intervals.length === 0) { alert('F&uuml;ge mindestens ein Intervall hinzu.'); return; }
  // auto-save with current name
  const name = document.getElementById('trainingNameInput').value.trim() || 'Unbenanntes Training';
  if (editingId) {
    const idx = trainings.findIndex(t => t.id === editingId);
    if (idx !== -1) trainings[idx] = { id: editingId, name, rounds, intervals: JSON.parse(JSON.stringify(intervals)) };
  } else {
    const id = 'T' + Date.now();
    trainings.push({ id, name, rounds, intervals: JSON.parse(JSON.stringify(intervals)) });
  }
  saveTrainings(trainings);
  launchTimer();
}

// ==============================
// RENAME MODAL
// ==============================
function closeModal() {
  document.getElementById('renameModal').classList.remove('open');
}
function confirmRename() {
  const name = document.getElementById('renameInput').value.trim();
  if (!name) return;
  const t = trainings.find(x => x.id === renameId);
  if (t) { t.name = name; saveTrainings(trainings); renderHome(); }
  closeModal();
}

// ==============================
// TIMER
// ==============================
function launchTimer() {
  phases = [];
  for (let r = 0; r < rounds; r++) {
    intervals.forEach(iv => phases.push({ ...iv, round: r + 1 }));
  }
  phaseIdx = 0; paused = false;
  document.getElementById('totalRounds').textContent = rounds;
  buildDots();
  showScreen('timerScreen');
  requestWakeLock();
  beginPhase();
}

function buildDots() {
  const el = document.getElementById('phaseDots');
  el.innerHTML = '';
  phases.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = `dot ${p.type}`; d.id = `dot-${i}`;
    el.appendChild(d);
  });
}

function updateDots() {
  phases.forEach((p, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    d.className = 'dot';
    if (i < phaseIdx) d.classList.add(`done-${p.type}`);
    else if (i === phaseIdx) d.classList.add('current', p.type);
  });
}

function beginPhase() {
  if (phaseIdx >= phases.length) { showDone(); return; }
  const p = phases[phaseIdx];
  remaining = p.duration;
  countdownBeepedSet = new Set();
  document.getElementById('currentRound').textContent = p.round;
  document.getElementById('pauseBtn').textContent = 'Pause';
  paused = false;
  updateDots();
  document.getElementById('ringProg').style.stroke = p.type === 'work' ? 'var(--work)' : 'var(--rest)';
  document.getElementById('timerTime').textContent = formatTime(remaining);
  document.getElementById('timerPhase').textContent = p.name;
  document.getElementById('timerPhase').className = `timer-phase ${p.type}`;
  document.getElementById('ringProg').style.strokeDashoffset = 0;
  clearInterval(timer);
  timer = setInterval(tick, 1000);
}

function tick() {
  if (paused) return;
  const p = phases[phaseIdx];
  remaining--;
  document.getElementById('timerTime').textContent = formatTime(remaining);
  document.getElementById('timerPhase').textContent = p.name;
  document.getElementById('timerPhase').className = `timer-phase ${p.type}`;
  const frac = remaining / p.duration;
  document.getElementById('ringProg').style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
  const next = phases[phaseIdx + 1];
  document.getElementById('nextUpVal').textContent = next
    ? `${next.name} &middot; ${formatTime(next.duration)}` : 'Letztes Intervall';
  maybeCountdown(remaining);
  if (remaining <= 0) {
    clearInterval(timer);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    beep(520, 0.35, 0.8);
    phaseIdx++;
    const isLast = phaseIdx >= phases.length;
    if (isLast) {
      setTimeout(showDone, 400);
    } else {
      setTimeout(beginPhase, 400);
    }
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Weiter' : 'Pause';
}

function skipPhase() {
  clearInterval(timer);
  phaseIdx++;
  beginPhase();
}



function showDone() {
  clearInterval(timer); releaseWakeLock();
  const total = phases.reduce((s, p) => s + p.duration, 0);
  document.getElementById('doneSub').textContent =
    `${rounds} Runde${rounds > 1 ? 'n' : ''} &middot; ${formatTime(total)} Gesamtzeit`;
  showScreen('doneScreen');
}

function goBack() {
  clearInterval(timer); releaseWakeLock(); paused = false;
  showScreen('homeScreen');
  renderHome();
}

// ==============================
// UTILS
// ==============================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==============================
// INIT
// ==============================
renderHome();
</script>
